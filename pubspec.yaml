name: healthmate
description: HealthMate — Personal AI Health Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Image picking (food photo)
  image_picker: ^1.0.7

  # Date/time
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # URL launcher (for OAuth flows)
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
